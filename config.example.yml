# medrec configuration
# Copy to config.yml and adjust as needed.

# PDF page rendering
render:
  dpi: 200                     # render resolution for LLM vision

# Obsidian vault folder names (under Medical Records/)
obsidian:
  root_folder: Medical Records
  patients_folder: Patients
  visits_folder: Visits
  topics_folder: Topics
  diseases_subfolder: Diseases
  symptoms_subfolder: Symptoms
  medications_subfolder: Medications
  herbs_subfolder: Herbs
  lab_indicators_subfolder: Lab Indicators
  tcm_patterns_subfolder: TCM Patterns
  sources_folder: Sources
  tag_prefix: medical-record

# Deduplication settings
dedup:
  fuzzy_threshold: 85          # ratio threshold for name matching
  content_hash_dedup: true     # detect and remove duplicate pages by content hash
